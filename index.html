<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта поселков — АН Простор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@300;400;600&family=Golos+Text:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1e2230;
    --border: #2a2f40;
    --accent: #e8c547;
    --accent2: #3b82f6;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --your: #e8c547;
    --istra: #3b82f6;
    --zemlya: #22c55e;
    --realt: #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 56px;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    white-space: nowrap;
  }

  .logo span { color: var(--text-muted); font-size: 13px; letter-spacing: 0; font-family: 'Golos Text', sans-serif; margin-left: 8px; }

  .header-divider { width: 1px; height: 28px; background: var(--border); }

  .counter {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .counter strong { color: var(--accent); font-weight: 600; font-size: 16px; margin-right: 4px; }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  .sync-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Golos Text', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sync-btn svg { width: 14px; height: 14px; }

  /* sheets-input-wrap удалён — ссылка вшита в код */

  /* MAIN */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .filters {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .filter-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    width: 15px;
    height: 15px;
  }

  .select-filter {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .select-filter:focus { border-color: var(--accent); }

  /* LEGEND */
  .legend {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 3px 8px 3px 5px;
    border-radius: 4px;
    transition: background 0.15s;
    user-select: none;
  }

  .legend-item:hover { background: var(--surface2); }
  .legend-item.active { color: var(--text); }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* LIST */
  .list-header {
    padding: 12px 16px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .list-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .list-count {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
  }

  .list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 8px;
  }

  .list::-webkit-scrollbar { width: 4px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .list-item {
    padding: 10px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-left: 2px solid transparent;
    margin-bottom: 2px;
  }

  .list-item:hover { background: var(--surface2); }
  .list-item.active { background: var(--surface2); border-left-color: var(--accent); }

  .item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .item-body { flex: 1; min-width: 0; }

  .item-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .item-meta {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .item-tag {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
  }

  /* MAP */
  #map {
    flex: 1;
    background: var(--bg);
    height: 100%;
    width: 100%;
  }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
    font-family: 'Golos Text', sans-serif !important;
    padding: 0 !important;
    min-width: 240px;
  }

  .leaflet-popup-tip { background: var(--surface2) !important; }
  .leaflet-popup-close-button { color: var(--text-muted) !important; font-size: 16px !important; padding: 8px 10px !important; }
  .leaflet-popup-close-button:hover { color: var(--text) !important; }

  .popup-inner { padding: 16px; }

  .popup-partner {
    font-size: 10px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .popup-name {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .popup-row {
    display: flex;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .popup-row strong { color: var(--text); min-width: 90px; }

  .popup-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 12px;
    background: var(--accent);
    color: #000;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .popup-link:hover { opacity: 0.85; }

  /* STATUS badge */
  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    margin-top: 8px;
  }

  .status-sale { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .status-start { background: rgba(249,115,22,0.15); color: #f97316; border: 1px solid rgba(249,115,22,0.3); }
  .status-done { background: rgba(107,114,128,0.15); color: #6b7280; border: 1px solid rgba(107,114,128,0.3); }


  /* LEGEND HEADER */
  .legend-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px 4px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .legend-header:hover { border-color: var(--border); }

  .legend-header-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .legend-select-all {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 9px;
    font-family: 'Unbounded', sans-serif;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .legend-select-all:hover { border-color: var(--accent); color: var(--accent); }

  .legend-toggle-arrow {
    color: var(--text-muted);
    font-size: 11px;
    transition: transform 0.25s;
    line-height: 1;
  }
  .legend-collapsed .legend-toggle-arrow { transform: rotate(180deg); }

  .legend-body {
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    max-height: 200px;
    opacity: 1;
  }
  .legend-collapsed .legend-body {
    max-height: 0;
    opacity: 0;
  }

  /* COLOR PICKER */
  .legend-item { position: relative; }
  .color-picker-wrap {
    position: absolute;
    bottom: 28px;
    left: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    display: none;
    z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    width: 148px;
  }
  .color-picker-wrap.open { display: flex; flex-wrap: wrap; gap: 5px; }
  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: white; }
  .color-edit-btn {
    width: 14px; height: 14px;
    opacity: 0;
    transition: opacity 0.15s;
    cursor: pointer;
    margin-left: 2px;
    flex-shrink: 0;
  }
  .legend-item:hover .color-edit-btn { opacity: 0.6; }
  .color-edit-btn:hover { opacity: 1 !important; }

  /* EMPTY STATE */
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 9999;
    transition: transform 0.3s;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #22c55e; color: #22c55e; }
  .toast.error { border-color: #ef4444; color: #ef4444; }

  /* LOADING */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,15,20,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    backdrop-filter: blur(4px);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Marker cluster числа */
  .leaflet-div-icon { background: transparent !important; border: none !important; overflow: visible !important; }
  .leaflet-marker-icon { overflow: visible !important; }

  .custom-marker {
    width: 28px;
    height: 28px;
    border-radius: 50% 50% 50% 2px;
    transform: rotate(-45deg);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: transform 0.2s;
    cursor: pointer;
  }

  .custom-marker .dot {
    width: 8px;
    height: 8px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    transform: rotate(45deg);
  }

  /* Поднимаем атрибуцию Leaflet над шторкой на мобиле */
  @media (max-width: 768px) {
    .leaflet-bottom.leaflet-left { bottom: 95px !important; }
    .leaflet-bottom.leaflet-right { bottom: 95px !important; }
    .leaflet-control-attribution { font-size: 9px !important; }
  }

  .info-box {
    position: absolute;
    bottom: 24px;
    right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.7;
    z-index: 500;
    pointer-events: none;
  }

  .info-box strong { color: var(--text); }

  /* mobile-toggle скрыт на десктопе */
  .mobile-toggle { display: none; }

  /* ============================================================
     MOBILE — DRAWER MENU
     ============================================================ */

  /* Бургер кнопка — только на мобиле */
  .burger-btn {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    width: 36px;
    height: 36px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    padding: 8px;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }
  .burger-btn:hover { border-color: var(--accent); }
  .burger-btn span {
    display: block;
    width: 100%;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.25s;
  }
  .burger-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .burger-btn.open span:nth-child(2) { opacity: 0; }
  .burger-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* Оверлей */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    backdrop-filter: blur(2px);
  }
  .drawer-overlay.open { display: block; }

  /* mobile-toggle скрыт везде кроме мобиле */
  .mobile-toggle { display: none; }

  @media (max-width: 768px) {

    /* Хедер */
    .header { padding: 0 12px; height: 52px; gap: 8px; }
    .logo span { display: none; }
    .header-divider { display: none; }
    .counter { font-size: 10px; }
    .counter strong { font-size: 15px; }
    #sync-time { display: none !important; }

    /* Бургер появляется */
    .burger-btn { display: flex; }

    /* Карта — весь экран */
    .main { position: relative; }
    #map { height: 100% !important; width: 100% !important; }
    .main > div:last-child { flex: 1; height: 100%; }

    /* Sidebar — выезжает слева как drawer */
    .sidebar {
      position: fixed;
      top: 52px;
      left: -320px;
      width: 300px;
      height: calc(100vh - 52px);
      border-right: 1px solid var(--border);
      border-top: none;
      border-radius: 0;
      z-index: 1000;
      transition: left 0.3s ease;
      overflow-y: auto;
      box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    }
    .sidebar.open { left: 0; }

    /* Фильтры — вертикально */
    .filters { padding: 12px; flex-direction: column; gap: 8px; }
    .filter-label { font-size: 9px; margin-bottom: 2px; }

    /* Легенда */
    .legend { flex-wrap: wrap; padding: 10px 12px; gap: 6px; }
    .legend-item { font-size: 11px; }

    /* Список */
    .list { padding: 0 8px 20px; }

    /* Атрибуция */
    .leaflet-bottom.leaflet-left { bottom: 8px !important; }
    .leaflet-bottom.leaflet-right { bottom: 8px !important; }
    .leaflet-control-attribution { font-size: 9px !important; }

    /* Попап */
    .leaflet-popup-content-wrapper {
      width: calc(100vw - 40px) !important;
      max-width: 360px !important;
    }

    /* Кнопка синхронизации — только иконка */
    .sync-btn span { display: none; }

    /* Info box скрыт */
    .info-box { display: none; }

    /* Сброс фильтров */
    .list-header { display: flex; }
  }


  /* КЛАСТЕРЫ */
  .marker-cluster-custom {
    background: var(--surface2);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }
  .marker-cluster-custom:hover { transform: scale(1.1); }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
    font-family: 'Unbounded', sans-serif;
    font-weight: 600;
  }
  .marker-cluster-small { background-color: rgba(232,197,71,0.15) !important; border: 2px solid #e8c547; }
  .marker-cluster-small div { background-color: rgba(232,197,71,0.5) !important; color: #e8c547; }
  .marker-cluster-medium { background-color: rgba(59,130,246,0.15) !important; border: 2px solid #3b82f6; }
  .marker-cluster-medium div { background-color: rgba(59,130,246,0.5) !important; color: #fff; }
  .marker-cluster-large { background-color: rgba(249,115,22,0.15) !important; border: 2px solid #f97316; }
  .marker-cluster-large div { background-color: rgba(249,115,22,0.5) !important; color: #fff; }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">ПРОСТОР <span>ИЖС / Загородка</span></div>
  <div class="header-divider"></div>
  <div class="counter"><strong id="total-count">0</strong> поселков на карте</div>

  <button class="burger-btn" id="burger-btn" onclick="toggleDrawer()" aria-label="Меню">
    <span></span><span></span><span></span>
  </button>
  <div class="header-right">
    <!-- Google Sheets URL input -->


    <div id="sync-time" style="font-size:11px;color:var(--text-muted);white-space:nowrap;display:none">
        обновлено <span id="sync-time-val">—</span>
      </div>
    <button class="sync-btn" onclick="autoLoadFromScript()" title="Обновить данные">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Синхронизировать
    </button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <!-- FILTERS -->
    <div class="filters">
      <div>
        <div class="filter-label">Поиск</div>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search" placeholder="Название поселка..." oninput="applyFilters()">
        </div>
      </div>
      <div>
        <div class="filter-label">Направление</div>
        <select class="select-filter" id="filter-direction" onchange="applyFilters()">
          <option value="">Все направления</option>
        </select>
      </div>
      <div>

function initMap() {
  map = L.map('map', {
    center: [55.85, 37.3],
    zoom: 9,
    zoomControl: false,
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18,
  }).addTo(map);

  L.control.zoom({ position: 'topright' }).addTo(map);

  // Инициализируем кластер
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    disableClusteringAtZoom: 13,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      let size = count < 10 ? 34 : count < 30 ? 40 : 46;
      return L.divIcon({
        html: '<div style="width:' + size + 'px;height:' + size + 'px;line-height:' + size + 'px;border-radius:50%;background:var(--surface2);border:2px solid var(--accent);text-align:center;font-family:Unbounded,sans-serif;font-size:11px;font-weight:600;color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,0.5)">' + count + '</div>',
        className: '',
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
      });
    }
  });
  map.addLayer(clusterGroup);
}

//  MARKER

function createIcon(color, badge) {
  const badgeKey = (badge || '').toLowerCase().trim();
  const bc = BADGE_CONFIG[badgeKey];

  if (bc) {
    // Бейдж рендерим СНИЗУ через отдельный блок, маркер сверху
    // iconAnchor указывает на кончик маркера (нижний центр всего блока)
    // Структура сверху вниз: [бейдж 20px gap 4px маркер 28px] = 52px total
    return L.divIcon({
      html: `
        <div style="position:relative;width:80px;height:52px;margin-left:-26px">
          <div style="
            position:absolute;
            bottom:32px;
            left:50%;
            transform:translateX(-50%);
            background:${bc.bg};
            border:1px solid ${bc.border};
            color:#fff;
            font-size:9px;
            font-family:'Unbounded',sans-serif;
            font-weight:600;
            padding:2px 6px;
            border-radius:4px;
            white-space:nowrap;
            box-shadow:0 2px 6px rgba(0,0,0,0.5);
            z-index:9999;
            pointer-events:none;
          ">${bc.label}</div>
          <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%)">
            <div class="custom-marker" style="background:${color}"><div class="dot"></div></div>
          </div>
        </div>`,
      iconSize: [80, 52],
      iconAnchor: [40, 52],
      popupAnchor: [0, -54],
      className: '',
    });
  }

  return L.divIcon({
    html: `<div class="custom-marker" style="background:${color}"><div class="dot"></div></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    popupAnchor: [0, -30],
    className: '',
  });
}

function getStatusBadge(status) {

  const map = {
    'В продаже': 'status-sale',

  };
  const cls = map[status] || 'status-done';
  return `<span class="status-badge ${cls}">${status}</span>`;
}

function buildPopup(d) {
  const color = getPartnerColor(d.partner);
  // Цены — показываем что есть
  const t = (d.type || '').toLowerCase();
  const hasLand = t.includes('участк') || t.includes('дом и') || t.includes('дома и');
  const hasHouse = t.includes('дом') || t.includes('коттедж') || t.includes('таунхаус') || t.includes('квартир');
  let priceStr = '';
  if (d.price_land && hasLand) priceStr += `<div class="popup-row"><strong>Участок от:</strong> ${d.price_land} млн руб</div>`;
  if (d.price_house && hasHouse) priceStr += `<div class="popup-row"><strong>Дом/ТХ от:</strong> ${d.price_house} млн руб</div>`;
  // Класс
  const klassStr = d.klass ? `<div class="popup-row"><strong>Класс:</strong> ${d.klass}</div>` : '';
  const kmStr = d.km ? `<div class="popup-row"><strong>От МКАД:</strong> ${d.km} км · ${d.highway || '—'}</div>` : '';
  const linkHtml = d.site ? `<a href="${d.site}" target="_blank" class="popup-link">Открыть сайт ↗</a>` : '';

  // Фото
  const photoHtml = d.photo
    ? `<div style="margin:-16px -1px 12px;border-radius:8px 8px 0 0;overflow:hidden;height:140px;background:var(--surface)">
        <img src="${d.photo}" alt="${d.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'">
       </div>`
    : '';

  // Бейдж в попапе
  const badgeKey = (d.badge || '').toLowerCase().trim();
  const bc = BADGE_CONFIG[badgeKey];
  const badgeHtml = bc
    ? `<span style="display:inline-block;background:${bc.bg};border:1px solid ${bc.border};color:#fff;font-size:10px;font-family:'Unbounded',sans-serif;font-weight:600;padding:2px 8px;border-radius:4px;margin-bottom:6px">${bc.label}</span>`
    : '';

  return `
    <div class="popup-inner" style="padding:${d.photo ? '0' : '16px'}">
      ${photoHtml}
      <div style="${d.photo ? 'padding:12px 16px 16px' : ''}">
        ${badgeHtml}
        <div class="popup-partner" style="color:${color};${d.photo ? '' : ''}">${d.partner || ''}</div>
        <div class="popup-name">${d.name}</div>
        ${getStatusBadge(d.status)}
        <div style="margin-top:10px">
          ${kmStr}
          ${priceStr}
          ${d.type ? `<div class="popup-row"><strong>Тип:</strong> ${d.type}</div>` : ''}
          ${klassStr}
        ${d.notes ? `<div class="popup-row"><strong>Заметка:</strong> ${d.notes}</div>` : ''}
        </div>
        ${linkHtml}
      </div>
    </div>
  `;
}

function renderMarkers() {
  // Очищаем кластер и маркеры
  if (clusterGroup) clusterGroup.clearLayers();
  markers = {};

  const newMarkers = [];

  filteredData.forEach((d, i) => {
    if (!d.lat || !d.lon) return;
    const color = getPartnerColor(d.partner);
    const marker = L.marker([d.lat, d.lon], { icon: createIcon(color, d.badge) })
      .bindPopup(buildPopup(d), { maxWidth: 300, autoPan: true, autoPanPadding: [20, 20], keepInView: true });

    marker.on('click', () => highlightListItem(i));
    markers[i] = marker;
    newMarkers.push(marker);
  });

  if (clusterGroup) clusterGroup.addLayers(newMarkers);
  updateCounters();
}

function renderList() {
  const list = document.getElementById('list');

  if (filteredData.length === 0) {
    list.innerHTML = `<div class="empty-state">Нет поселков по заданным фильтрам</div>`;
    return;
  }

  list.innerHTML = filteredData.map((d, i) => {
    const color = getPartnerColor(d.partner);
    const km = d.km ? `${d.km} км` : '';
    const hw = d.highway || '';
    return `
      <div class="list-item" id="list-item-${i}" onclick="focusItem(${i})">
        <div class="item-dot" style="background:${color}"></div>
        <div class="item-body">
          <div class="item-name">${d.name}</div>
          <div class="item-meta">
            ${km && hw ? `<span>${hw}, ${km}</span>` : (km || hw)}
            ${d.status === 'Старт продаж' ? `<span class="item-tag" style="color:#f97316;border-color:rgba(249,115,22,0.3)">Старт</span>` : ''}
          ${d.badge ? (() => { const bk=(d.badge||'').toLowerCase().trim(); const bc=BADGE_CONFIG[bk]; return bc ? `<span class="item-tag" style="color:#fff;background:${bc.bg};border-color:${bc.border}">${bc.label}</span>` : ''; })() : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function updateCounters() {
  const total = allData.length;
  const found = filteredData.length;
  const isFiltered = found < total;

  document.getElementById('total-count').textContent = found;
  document.getElementById('list-count').textContent = found;

  const totalEl = document.getElementById('list-total');
  if (totalEl) totalEl.textContent = isFiltered ? 'из ' + total : '';

  const resetBtn = document.getElementById('reset-filters-btn');
  if (resetBtn) resetBtn.style.display = isFiltered ? 'block' : 'none';

  const mc = document.getElementById('mobile-count');
  if (mc) mc.textContent = found + (isFiltered ? '/' + total : '');
}

function focusItem(i) {
  const d = filteredData[i];
  if (!d || !d.lat) return;

  map.setView([d.lat, d.lon], 13, { animate: true });

  if (markers[i]) {
    setTimeout(() => markers[i].openPopup(), 400);
  }

  highlightListItem(i);
}

function highlightListItem(i) {
  if (activeListItem !== null) {
    const prev = document.getElementById(`list-item-${activeListItem}`);
    if (prev) prev.classList.remove('active');
  }
  const cur = document.getElementById(`list-item-${i}`);
  if (cur) {
    cur.classList.add('active');
    cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
  activeListItem = i;
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-direction').value = '';
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-type').value = '';
  if (document.getElementById('filter-klass')) document.getElementById('filter-klass').value = '';
  // Включаем всех партнёров
  document.querySelectorAll('.legend-item').forEach(el => {
    const partner = el.dataset.partner;
    if (partner) {
      activePartners.add(partner);
      el.classList.add('active');
      el.style.opacity = '1';
    }
  });
  applyFilters();
}

function applyFilters() {
  updateFilterOptions();
  renderLegend();
  const search = document.getElementById('search').value.toLowerCase();
  const direction = document.getElementById('filter-direction').value;
  const status = document.getElementById('filter-status').value;
  const typeFilter = document.getElementById('filter-type').value;
  const klassFilter = document.getElementById('filter-klass') ? document.getElementById('filter-klass').value : '';

  filteredData = allData.filter(d => {
    if (!activePartners.has(d.partner)) return false;
    if (search && !d.name.toLowerCase().includes(search)) return false;
    if (direction && d.direction !== direction) return false;
    if (status && d.status !== status) return false;
    if (typeFilter) {
      const t = (d.type || '').toLowerCase();
      const match =
        (typeFilter === 'участки' && t.includes('участк')) ||
        (typeFilter === 'дома' && (t.includes('дом') || t.includes('коттедж'))) ||
        (typeFilter === 'таунхаус' && (t.includes('таунхаус') || t.includes('квартир')));
      if (!match) return false;
    }
    if (klassFilter && d.klass !== klassFilter) return false;
    return true;
  });

  renderMarkers();
  renderList();
}

  { value: 'дома',    label: 'Дома / Коттеджи',    match: t => t.includes('дом') || t.includes('коттедж') },

function updateFilterOptions() {
  // Направления — динамически из данных
  const dirSelect = document.getElementById('filter-direction');
  const curDir = dirSelect.value;
  const dirs = [...new Set(allData.map(d => d.direction).filter(Boolean))].sort();
  dirSelect.innerHTML = '<option value="">Все направления</option>' +
    dirs.map(d => `<option ${d===curDir?'selected':''}>${d}</option>`).join('');

  // Статусы — динамически из данных
  const stSelect = document.getElementById('filter-status');
  const curSt = stSelect.value;
  const statuses = [...new Set(allData.map(d => d.status).filter(Boolean))].sort();
  stSelect.innerHTML = '<option value="">Все статусы</option>' +
    statuses.map(s => `<option ${s===curSt?'selected':''}>${s}</option>`).join('');

  // Класс — динамически из данных
  const klassSelect = document.getElementById('filter-klass');
  if (klassSelect) {
    const curKlass = klassSelect.value;
    const klasses = [...new Set(allData.map(d => d.klass).filter(Boolean))];
    // Сортируем по порядку
    const klassOrder = ['Эконом', 'Комфорт', 'Бизнес', 'Премиум'];
    klasses.sort((a, b) => {
      const ai = klassOrder.indexOf(a); const bi = klassOrder.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    klassSelect.innerHTML = '<option value="">Все классы</option>' +
      klasses.map(k => `<option ${k===curKlass?'selected':''}>${k}</option>`).join('');
  }

  // Типы — умная группировка, показываем только те группы у которых есть данные
  const typeSelect = document.getElementById('filter-type');
  const curType = typeSelect.value;
  const availableGroups = TYPE_GROUPS.filter(group =>
    allData.some(d => group.match((d.type || '').toLowerCase()))
  );
  typeSelect.innerHTML = '<option value="">Все типы</option>' +
    availableGroups.map(g =>
      `<option value="${g.value}" ${g.value===curType?'selected':''}>${g.label}</option>`
    ).join('');
}

  if (e && (e.target.closest('.color-edit-btn') || e.target.closest('.color-picker-wrap'))) return;

  if (activePartners.has(partner)) {

    activePartners.add(partner);
    el.classList.add('active');
    el.style.opacity = '1';
  }
  applyFilters();
}

function detectUrlType(url) {
  if (url.includes('script.google.com/macros')) return 'apps_script';
  if (url.includes('spreadsheets/d/')) return 'sheets';
  return null;
}

async function loadFromSheets() {
  const url = document.getElementById('sheets-url').value.trim();
  if (!url) {
    showToast('Вставь ссылку на Apps Script или Google Таблицу', 'error');
    return;
  }

  const type = detectUrlType(url);
  if (!type) {
    showToast('Неверный формат ссылки', 'error');
    return;
  }

  showToast('Загружаю данные...');

  try {
    if (type === 'apps_script') {
      // Apps Script возвращает JSON
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('Нет доступа');
      const json = await resp.json();

      if (!Array.isArray(json) || json.length === 0) throw new Error('Данные пустые или неверный формат');

      const parsed = parseJSON(json);
      if (parsed.length === 0) throw new Error('Не найдено ни одного поселка с координатами');

      allData = parsed;
      // Добавляем новых партнёров в активные
      parsed.forEach(d => { if (d.partner) activePartners.add(d.partner); });
      applyFilters();
      showToast(`✓ Загружено ${parsed.length} поселков`, 'success');

    } else {
      // Прямая Google Таблица — CSV экспорт
      const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      const sheetId = match ? match[1] : null;
      if (!sheetId) throw new Error('Не удалось извлечь ID таблицы');

      const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=0`;
      const resp = await fetch(csvUrl);
      if (!resp.ok) throw new Error('Нет доступа к таблице. Попробуй Apps Script.');
      const text = await resp.text();
      const parsed = parseCSV(text);
      if (parsed.length === 0) throw new Error('Таблица пустая или неверный формат');

      allData = parsed;
      // Добавляем новых партнёров в активные
      parsed.forEach(d => { if (d.partner) activePartners.add(d.partner); });
      applyFilters();
      showToast(`✓ Загружено ${parsed.length} поселков`, 'success');
    }
  } catch (e) {
    showToast('Ошибка: ' + e.message, 'error');
    console.error(e);
  }
}

function parseJSON(rows) {
  // rows — массив объектов из Apps Script
  const colMap = {
    'название': 'name',
    'партнёр': 'partner',
    'направление': 'direction',
    'шоссе': 'highway',
    'км от мкад': 'km',
    'широта': 'lat',
    'долгота': 'lon',
    'статус': 'status',
    'тип': 'type',
    'цена зу (млн)': 'price_land',
    'цена дома (млн)': 'price_house',
    'класс': 'klass',
    'сайт': 'site',
    'заметки': 'notes',
    'фото': 'photo',
    'бейдж': 'badge',
  };

  return rows.map(row => {
    const d = {};
    Object.entries(row).forEach(([key, val]) => {
      const mapped = colMap[key.toLowerCase().trim()];
      if (mapped) d[mapped] = String(val).trim();
    });
    const lat = parseFloat(d.lat);
    const lon = parseFloat(d.lon);
    if (!d.name || isNaN(lat) || isNaN(lon)) return null;
    return { ...d, lat, lon, km: parseInt(d.km) || 0 };
  }).filter(Boolean);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];

  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());

  // Маппинг заголовков
  const colMap = {
    'название': 'name',
    'партнёр': 'partner',
    'направление': 'direction',
    'шоссе': 'highway',
    'км от мкад': 'km',
    'широта': 'lat',
    'долгота': 'lon',
    'статус': 'status',
    'тип': 'type',
    'цена зу (млн)': 'price_land',
    'цена дома (млн)': 'price_house',
    'класс': 'klass',
    'сайт': 'site',
    'заметки': 'notes',
    'фото': 'photo',
    'бейдж': 'badge',
  };

  const colIndex = {};
  headers.forEach((h, i) => {
    const key = colMap[h];
    if (key) colIndex[key] = i;
  });

  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = splitCSVLine(lines[i]);
    if (!cols || cols.length < 3) continue;

    const get = (key) => {
      const idx = colIndex[key];
      return idx !== undefined ? (cols[idx] || '').trim() : '';
    };

    const lat = parseFloat(get('lat'));
    const lon = parseFloat(get('lon'));
    if (!get('name') || isNaN(lat) || isNaN(lon)) continue;

    result.push({
      name: get('name'),
      partner: get('partner') || 'Другое',
      direction: get('direction'),
      highway: get('highway'),
      km: parseInt(get('km')) || 0,
      lat,
      lon,
      status: get('status') || 'В продаже',
      type: get('type'),
      price: get('price'),
      site: get('site'),
      notes: get('notes'),
    });
  }

  return result;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; continue; }
    if (c === ',' && !inQuotes) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

function updateSyncTime() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const d = now.getDate().toString().padStart(2,'0');
  const mo = (now.getMonth()+1).toString().padStart(2,'0');
  const val = document.getElementById('sync-time-val');
  const wrap = document.getElementById('sync-time');
  if (val) val.textContent = d + '.' + mo + ' ' + h + ':' + m;
  if (wrap) wrap.style.display = 'block';
}

async function autoLoadFromScript() {
  showToast('Загружаю данные...');
  try {
    const resp = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('Нет доступа');
    const json = await resp.json();
    if (!Array.isArray(json) || json.length === 0) throw new Error('Пустой ответ');
    const parsed = parseJSON(json);
    if (parsed.length === 0) throw new Error('Нет данных с координатами');
    allData = parsed;
    applyFilters();
    showToast('✓ Загружено ' + parsed.length + ' поселков', 'success');
    updateSyncTime();
  } catch(e) {
    // Если не загрузилось — показываем встроенные данные
    console.warn('Apps Script недоступен, используем встроенные данные:', e.message);
    showToast('Встроенные данные (' + allData.length + ' поселков)', '');
  }
}
</script>
